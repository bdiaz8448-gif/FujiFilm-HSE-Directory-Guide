<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSM-4 Room QR Code Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #0a1628 0%, #0d2137 100%);
    border-bottom: 2px solid #00bcd4;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-icon { font-size: 32px; }
  .header h1 { font-size: 20px; color: #00bcd4; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 12px; color: #8b949e; margin-top: 2px; }

  .controls {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 18px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: flex-end;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
  .ctrl-group label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .ctrl-group input, .ctrl-group select {
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e6edf3;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    min-width: 200px;
  }
  .ctrl-group input:focus, .ctrl-group select:focus {
    outline: none;
    border-color: #00bcd4;
  }
  .url-input { min-width: 380px !important; }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: #00bcd4; color: #0d1117; }
  .btn-primary:hover { background: #00e5ff; }
  .btn-success { background: #238636; color: #fff; }
  .btn-success:hover { background: #2ea043; }
  .btn-danger { background: #7b0000; color: #fff; }
  .btn-danger:hover { background: #c62828; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .stats-bar {
    background: #0d2137;
    border-bottom: 1px solid #30363d;
    padding: 10px 28px;
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: #8b949e;
  }
  .stats-bar span { color: #00bcd4; font-weight: 700; }

  .filter-bar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 28px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar label { font-size: 12px; color: #8b949e; }
  .filter-chip {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip.active { background: #00bcd4; border-color: #00bcd4; color: #0d1117; font-weight: 700; }
  .filter-chip:hover:not(.active) { border-color: #00bcd4; color: #00bcd4; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    padding: 20px 28px;
  }

  .room-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .room-card:hover { border-color: #00bcd4; }
  .room-card.hidden { display: none; }

  .card-header {
    background: #0a1628;
    padding: 10px 14px;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .card-floor { font-size: 10px; color: #00bcd4; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .card-type {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .type-production { background: #1a472a; color: #56d364; }
  .type-lab       { background: #1a3a5c; color: #58a6ff; }
  .type-utility   { background: #2d1b00; color: #e3b341; }
  .type-storage   { background: #2d2d00; color: #f0e68c; }
  .type-anteroom  { background: #2d0a2d; color: #d2a8ff; }
  .type-corridor  { background: #1c1c1c; color: #8b949e; }
  .type-stair     { background: #1c1c1c; color: #8b949e; }
  .type-interstitial { background: #1c2020; color: #7ee7b4; }

  .card-body { padding: 12px 14px; }
  .card-room-name { font-size: 14px; font-weight: 700; color: #e6edf3; line-height: 1.3; margin-bottom: 4px; }
  .card-room-no { font-size: 12px; color: #00bcd4; font-family: monospace; margin-bottom: 8px; }
  .card-sector { font-size: 11px; color: #8b949e; margin-bottom: 10px; }

  .qr-area {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 10px;
    min-height: 140px;
  }
  .qr-area canvas { display: block; }
  .qr-placeholder {
    color: #8b949e;
    font-size: 12px;
    text-align: center;
  }

  .card-url {
    font-size: 9px;
    color: #30363d;
    word-break: break-all;
    line-height: 1.4;
    margin-bottom: 10px;
    font-family: monospace;
  }

  .card-actions { display: flex; gap: 6px; }
  .btn-sm {
    flex: 1;
    padding: 6px 10px;
    font-size: 11px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-dl { background: #238636; color: #fff; }
  .btn-dl:hover { background: #2ea043; }
  .btn-copy { background: #1f6feb; color: #fff; }
  .btn-copy:hover { background: #388bfd; }

  .progress-bar {
    display: none;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 28px;
    align-items: center;
    gap: 12px;
  }
  .progress-bar.visible { display: flex; }
  .progress-track {
    flex: 1;
    height: 6px;
    background: #30363d;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: #00bcd4; border-radius: 3px; transition: width 0.2s; }
  .progress-text { font-size: 12px; color: #8b949e; white-space: nowrap; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #8b949e;
    display: none;
  }
  .empty-state.visible { display: block; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #238636;
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    display: none;
    z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .toast.visible { display: block; }
  .toast.err { background: #7b0000; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏭</div>
  <div>
    <h1>DSM-4 ROOM QR CODE GENERATOR</h1>
    <p>Fujifilm Diosynth Biotechnologies · Aura HSE Directory · Jacobs Project 22JAAE03</p>
  </div>
</div>

<div class="controls">
  <div class="ctrl-group" style="flex:1; min-width:300px;">
    <label>App URL (paste your Aura HSE Directory link here)</label>
    <input type="url" id="appUrl" class="url-input"
      placeholder="https://bdiaz8448-gif.github.io/FujiFilm-HSE-Directory-Guide/Aura-HSE-Directory-Safety-Reference.html"
      value="https://bdiaz8448-gif.github.io/FujiFilm-HSE-Directory-Guide/Aura-HSE-Directory-Safety-Reference.html">
  </div>
  <div class="ctrl-group">
    <label>QR Size (px)</label>
    <select id="qrSize">
      <option value="128">128 × 128</option>
      <option value="200" selected>200 × 200</option>
      <option value="256">256 × 256</option>
      <option value="300">300 × 300</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Filter by Floor</label>
    <select id="floorFilter">
      <option value="">All Floors</option>
      <option value="Ground Floor">Ground Floor</option>
      <option value="Ground Floor (Interstitial">Ground Floor Interstitial</option>
      <option value="First Floor">First Floor</option>
      <option value="First Floor (Interstitial">First Floor Interstitial</option>
      <option value="Second Floor">Second Floor</option>
      <option value="Second Floor (Interstitial">Second Floor Interstitial</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="generateAll()">⚡ Generate All QR Codes</button>
  <button class="btn btn-success" id="dlZipBtn" onclick="downloadZip()" disabled>📦 Download All as ZIP</button>
</div>

<div class="filter-bar">
  <label>Room Type:</label>
  <button class="filter-chip active" onclick="filterType('all',this)">All</button>
  <button class="filter-chip" onclick="filterType('Production',this)">Production</button>
  <button class="filter-chip" onclick="filterType('Lab',this)">Lab</button>
  <button class="filter-chip" onclick="filterType('Utility',this)">Utility</button>
  <button class="filter-chip" onclick="filterType('Storage',this)">Storage</button>
  <button class="filter-chip" onclick="filterType('Anteroom',this)">Anteroom</button>
  <button class="filter-chip" onclick="filterType('Corridor',this)">Corridor</button>
  <button class="filter-chip" onclick="filterType('Stair',this)">Stair</button>
  <button class="filter-chip" onclick="filterType('Interstitial',this)">Interstitial</button>
</div>

<div class="stats-bar" id="statsBar">
  <div>Total rooms: <span id="totalCount">0</span></div>
  <div>Showing: <span id="visibleCount">0</span></div>
  <div>QR codes generated: <span id="genCount">0</span></div>
</div>

<div class="progress-bar" id="progressBar">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">Generating...</div>
</div>

<div class="grid" id="roomGrid"></div>
<div class="empty-state" id="emptyState">
  <div style="font-size:48px;margin-bottom:12px;">🔍</div>
  <div style="font-size:16px;margin-bottom:6px;">No rooms match this filter</div>
  <div style="font-size:13px;">Try selecting a different type or floor</div>
</div>

<div class="toast" id="toast"></div>

// ─── STATE ────────────────────────────────────────────────────────────────────
var activeTypeFilter = 'all';
var activeFloorFilter = '';
var generatedCount = 0;
var qrInstances = {};

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init(){
  renderCards();
  updateStats();
  document.getElementById('floorFilter').addEventListener('change', function(){
    activeFloorFilter = this.value;
    applyFilters();
    updateStats();
  });
})();

function buildUrl(r){
  var base = (document.getElementById('appUrl').value || '').trim();
  if(!base) base = window.location.href.split('?')[0]; // fallback
  var params = new URLSearchParams({
    building: r.building,
    floor:    r.floor,
    sector:   r.sector,
    room:     r.room,
    roomNo:   r.no
  });
  return base + '?' + params.toString();
}

function typeClass(t){
  var map = {
    'Production':'type-production','Lab':'type-lab','Utility':'type-utility',
    'Storage':'type-storage','Anteroom':'type-anteroom','Corridor':'type-corridor',
    'Stair':'type-stair','Interstitial':'type-interstitial','Support':'type-utility'
  };
  return map[t] || 'type-corridor';
}

function safeId(no){ return 'room_' + no.replace(/[^a-z0-9]/gi,'_'); }

function renderCards(){
  var grid = document.getElementById('roomGrid');
  grid.innerHTML = '';
  ROOMS.forEach(function(r){
    var id = safeId(r.no);
    var card = document.createElement('div');
    card.className = 'room-card';
    card.id = 'card_' + id;
    card.dataset.type = r.type;
    card.dataset.floor = r.floor;
    card.innerHTML =
      '<div class="card-header">' +
        '<div>' +
          '<div class="card-floor">' + r.building + ' &middot; ' + r.floor + '</div>' +
        '</div>' +
        '<span class="card-type ' + typeClass(r.type) + '">' + r.type + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-room-name">' + r.room + '</div>' +
        '<div class="card-room-no">' + r.no + '</div>' +
        '<div class="card-sector">Sector: ' + r.sector + ' &nbsp;|&nbsp; <em style="font-size:10px;color:#444;">Edit sector in CSV then re-import</em></div>' +
        '<div class="qr-area" id="qra_' + id + '">' +
          '<div class="qr-placeholder">Click "Generate All QR Codes"<br>to create this QR</div>' +
        '</div>' +
        '<div class="card-url" id="url_' + id + '">URL will appear here after generation</div>' +
        '<div class="card-actions">' +
          '<button class="btn-sm btn-dl" id="dl_' + id + '" onclick="downloadSingle(\'' + r.no + '\')" disabled>⬇ Download PNG</button>' +
          '<button class="btn-sm btn-copy" onclick="copyUrl(\'' + r.no + '\')" id="cp_' + id + '" disabled>📋 Copy URL</button>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
  updateStats();
}

async function generateAll(){
  var appUrl = document.getElementById('appUrl').value.trim();
  if(!appUrl){
    showToast('⚠️ Please enter your App URL first', true);
    return;
  }

  var size = parseInt(document.getElementById('qrSize').value);
  var pb = document.getElementById('progressBar');
  pb.classList.add('visible');
  generatedCount = 0;
  document.getElementById('dlZipBtn').disabled = true;

  for(var i = 0; i < ROOMS.length; i++){
    var r = ROOMS[i];
    var id = safeId(r.no);
    var url = buildUrl(r);

    // Update progress
    var pct = Math.round((i / ROOMS.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = 'Generating ' + (i+1) + ' / ' + ROOMS.length + ' — ' + r.room + ' (' + r.no + ')';

    // Clear previous QR
    var qrArea = document.getElementById('qra_' + id);
    qrArea.innerHTML = '';

    // Generate QR using QRCode.js
    try {
      var qrDiv = document.createElement('div');
      qrArea.appendChild(qrDiv);
      var qrObj = new QRCode(qrDiv, {
        text: url,
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      qrInstances[r.no] = { obj: qrObj, el: qrDiv, url: url };
    } catch(e) {
      qrArea.innerHTML = '<div style="color:#f00;font-size:11px;">Error: ' + e.message + '</div>';
    }

    // Update URL display
    var urlEl = document.getElementById('url_' + id);
    if(urlEl) urlEl.textContent = url;

    // Enable buttons
    var dlBtn = document.getElementById('dl_' + id);
    var cpBtn = document.getElementById('cp_' + id);
    if(dlBtn) dlBtn.disabled = false;
    if(cpBtn) cpBtn.disabled = false;

    generatedCount++;
    updateStats();

    // Yield to browser to render
    if(i % 5 === 0) await new Promise(function(r){ setTimeout(r, 10); });
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '✅ Done! ' + generatedCount + ' QR codes generated.';
  document.getElementById('dlZipBtn').disabled = false;
  setTimeout(function(){ pb.classList.remove('visible'); }, 3000);
  showToast('✅ All ' + generatedCount + ' QR codes generated!');
}

function getCanvas(roomNo){
  var id = safeId(roomNo);
  var qrArea = document.getElementById('qra_' + id);
  if(!qrArea) return null;
  return qrArea.querySelector('canvas');
}

function downloadSingle(roomNo){
  var canvas = getCanvas(roomNo);
  if(!canvas){ showToast('Generate QR codes first', true); return; }
  var r = ROOMS.find(function(x){ return x.no === roomNo; });
  var link = document.createElement('a');
  link.download = 'QR_' + roomNo.replace(/[^a-z0-9]/gi,'-') + '_' + (r ? r.room.replace(/[^a-z0-9]/gi,'-') : '') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function copyUrl(roomNo){
  var inst = qrInstances[roomNo];
  if(!inst){ showToast('Generate QR codes first', true); return; }
  navigator.clipboard.writeText(inst.url).then(function(){
    showToast('URL copied to clipboard!');
  }).catch(function(){
    showToast('Copy failed — try manually', true);
  });
}

async function downloadZip(){
  if(typeof JSZip === 'undefined'){ showToast('JSZip not loaded', true); return; }
  var zip = new JSZip();
  var count = 0;
  var pb = document.getElementById('progressBar');
  pb.classList.add('visible');

  for(var i = 0; i < ROOMS.length; i++){
    var r = ROOMS[i];
    var canvas = getCanvas(r.no);
    if(!canvas) continue;
    var dataUrl = canvas.toDataURL('image/png');
    var base64 = dataUrl.replace(/^data:image\/png;base64,/, '');
    var fname = r.floor.replace(/[^a-z0-9]/gi,'-').replace(/-+/g,'-') + '/' +
                'QR_' + r.no.replace(/[^a-z0-9]/gi,'-') + '_' +
                r.room.replace(/[^a-z0-9]/gi,'-').replace(/-+/g,'-').slice(0,30) + '.png';
    zip.file(fname, base64, {base64: true});
    count++;
    document.getElementById('progressFill').style.width = Math.round((i/ROOMS.length)*100) + '%';
    document.getElementById('progressText').textContent = 'Packing ' + (i+1) + ' / ' + ROOMS.length;
    if(i % 10 === 0) await new Promise(function(res){ setTimeout(res, 5); });
  }

  document.getElementById('progressText').textContent = 'Creating ZIP file...';
  var blob = await zip.generateAsync({type:'blob'});
  var link = document.createElement('a');
  link.download = 'DSM4-QR-Codes.zip';
  link.href = URL.createObjectURL(blob);
  link.click();
  pb.classList.remove('visible');
  showToast('✅ ZIP downloaded — ' + count + ' QR codes, organized by floor');
}

function filterType(type, btn){
  activeTypeFilter = type;
  document.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  applyFilters();
  updateStats();
}

function applyFilters(){
  var visible = 0;
  document.querySelectorAll('.room-card').forEach(function(card){
    var typeOk = activeTypeFilter === 'all' || card.dataset.type === activeTypeFilter;
    var floorOk = !activeFloorFilter || card.dataset.floor.indexOf(activeFloorFilter) !== -1;
    if(typeOk && floorOk){
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('emptyState').classList.toggle('visible', visible === 0);
}

function updateStats(){
  var visible = document.querySelectorAll('.room-card:not(.hidden)').length;
  document.getElementById('totalCount').textContent = ROOMS.length;
  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('genCount').textContent = generatedCount;
}

function showToast(msg, err){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible' + (err ? ' err' : '');
  setTimeout(function(){ t.classList.remove('visible'); }, 3000);
}
</script>
